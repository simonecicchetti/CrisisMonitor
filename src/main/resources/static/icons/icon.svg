<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c24"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64d2ff"/>
      <stop offset="100%" style="stop-color:#0a84ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Globe circle -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#globe)" stroke-width="8" opacity="0.3"/>

  <!-- Globe lines -->
  <ellipse cx="256" cy="256" rx="140" ry="60" fill="none" stroke="url(#globe)" stroke-width="4" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="60" ry="140" fill="none" stroke="url(#globe)" stroke-width="4" opacity="0.4"/>
  <line x1="116" y1="256" x2="396" y2="256" stroke="url(#globe)" stroke-width="4" opacity="0.4"/>

  <!-- Alert pulse -->
  <circle cx="340" cy="180" r="40" fill="#ff453a" opacity="0.2">
    <animate attributeName="r" values="35;45;35" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="180" r="20" fill="#ff453a"/>

  <!-- Data points -->
  <circle cx="180" cy="220" r="12" fill="#30d158"/>
  <circle cx="220" cy="320" r="10" fill="#ff9f0a"/>
  <circle cx="300" cy="290" r="14" fill="#ff453a"/>
  <circle cx="160" cy="280" r="8" fill="#64d2ff"/>
</svg>
