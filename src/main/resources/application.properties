# Server Configuration
server.port=8080

# Disable DevTools restart to prevent ClassCastException with Redis
spring.devtools.restart.enabled=false

# Application Name
spring.application.name=Crisis Monitor

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# External API Configuration
api.hungermap.base-url=https://api.hungermapdata.org
api.pdc.base-url=https://apps.pdc.org/msf/rest/services/global/pdc_active_hazards/MapServer/1

# Redis Cache Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=false
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Static Resource Cache Control (disable for development)
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# Claude AI Analysis
anthropic.api.key=${CLAUDE_API_KEY:}
anthropic.model=claude-sonnet-4-20250514

# Logging
logging.level.com.crisismonitor=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
